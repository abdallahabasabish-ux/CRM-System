<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تسجيل الدخول - نظام إدارة الأعمال</title>

  <!-- Bootstrap 5 RTL -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet" />
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <!-- Toastify -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
  <!-- SweetAlert2 -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <!-- الأنماط المخصصة -->
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body class="login-page">

  <div class="login-card">
    <!-- الشعار والعلامة التجارية -->
    <div class="brand">
      <div class="logo-icon">A</div>
      <h2>نظام الإدارة</h2>
      <p>منصة متكاملة لإدارة أعمالك</p>
    </div>

    <!-- تبويبات تسجيل الدخول / إنشاء حساب -->
    <ul class="nav nav-tabs justify-content-center" id="authTabs" role="tablist">
      <li class="nav-item" role="presentation">
        <button class="nav-link active" id="login-tab" data-bs-toggle="tab" data-bs-target="#loginPanel" type="button" role="tab">تسجيل الدخول</button>
      </li>
      <li class="nav-item" role="presentation">
        <button class="nav-link" id="register-tab" data-bs-toggle="tab" data-bs-target="#registerPanel" type="button" role="tab">إنشاء حساب</button>
      </li>
    </ul>

    <div class="tab-content mt-4">
      <!-- ====== لوحة تسجيل الدخول ====== -->
      <div class="tab-pane fade show active" id="loginPanel" role="tabpanel">
        <form id="loginForm">
          <div class="form-group">
            <label for="loginEmail" class="form-label">البريد الإلكتروني</label>
            <input type="email" class="form-control" id="loginEmail" placeholder="example@company.com" required />
          </div>
          <div class="form-group">
            <label for="loginPassword" class="form-label">كلمة المرور</label>
            <div class="input-group">
              <input type="password" class="form-control" id="loginPassword" placeholder="••••••••" required />
              <button class="btn btn-outline-secondary" type="button" id="toggleLoginPassword">
                <i class="fas fa-eye"></i>
              </button>
            </div>
          </div>
          <button type="submit" class="btn btn-primary w-100" id="loginBtn">
            <i class="fas fa-sign-in-alt me-2"></i>تسجيل الدخول
          </button>
          <div id="loginError" class="error-msg"></div>
        </form>

        <div class="divider">أو</div>

        <!-- زر تسجيل الدخول بـ Google -->
        <button class="btn-google w-100" id="googleLoginBtn">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 48 48">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          </svg>
          تسجيل الدخول عبر Google
        </button>

        <div class="extra-links">
          <a href="#" id="forgotPasswordLink">نسيت كلمة المرور؟</a>
        </div>
      </div>

      <!-- ====== لوحة إنشاء حساب ====== -->
      <div class="tab-pane fade" id="registerPanel" role="tabpanel">
        <form id="registerForm">
          <div class="form-group">
            <label for="registerName" class="form-label">الاسم كاملاً</label>
            <input type="text" class="form-control" id="registerName" placeholder="أحمد محمد" />
          </div>
          <div class="form-group">
            <label for="registerEmail" class="form-label">البريد الإلكتروني</label>
            <input type="email" class="form-control" id="registerEmail" placeholder="example@company.com" required />
          </div>
          <div class="form-group">
            <label for="registerPassword" class="form-label">كلمة المرور</label>
            <div class="input-group">
              <input type="password" class="form-control" id="registerPassword" placeholder="••••••••" required minlength="6" />
              <button class="btn btn-outline-secondary" type="button" id="toggleRegisterPassword">
                <i class="fas fa-eye"></i>
              </button>
            </div>
          </div>
          <div class="form-group">
            <label for="registerConfirm" class="form-label">تأكيد كلمة المرور</label>
            <div class="input-group">
              <input type="password" class="form-control" id="registerConfirm" placeholder="••••••••" required minlength="6" />
              <button class="btn btn-outline-secondary" type="button" id="toggleRegisterConfirm">
                <i class="fas fa-eye"></i>
              </button>
            </div>
          </div>
          <button type="submit" class="btn btn-primary w-100" id="registerBtn">
            <i class="fas fa-user-plus me-2"></i>إنشاء حساب
          </button>
          <div id="registerError" class="error-msg"></div>
        </form>

        <div class="divider">أو</div>

        <!-- زر التسجيل عبر Google -->
        <button class="btn-google w-100" id="googleRegisterBtn">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 48 48">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          </svg>
          التسجيل عبر Google
        </button>
      </div>
    </div>

    <!-- زر تبديل الوضع المظلم -->
    <div class="text-center mt-3">
      <button class="icon-btn theme-toggle" id="themeToggle" title="تبديل الوضع المظلم">
        <i class="fas fa-moon"></i>
      </button>
    </div>
  </div>

  <!-- ========================================================= -->
  <!-- Import Map & Firebase -->
  <!-- ========================================================= -->
  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js",
        "firebase/storage": "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js"
      }
    }
  </script>

  <script type="module" src="assets/js/main.js"></script>
  <script type="module" src="assets/js/login.js"></script>

</body>
</html>
