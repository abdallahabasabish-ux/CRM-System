<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>التقارير والإحصائيات - نظام إدارة الأعمال</title>

  <!-- Bootstrap 5 RTL -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet" />
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <!-- SweetAlert2 -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <!-- Toastify -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <!-- SheetJS (Excel) -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <!-- jsPDF + html2canvas -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <!-- الأنماط المخصصة -->
  <link rel="stylesheet" href="assets/css/style.css" />

  <style>
    /* تحسينات إضافية */
    .filter-btn.active {
      background-color: #ff6600 !important;
      color: #fff !important;
      border-color: #ff6600 !important;
      box-shadow: 0 4px 12px rgba(255,102,0,0.3);
    }
    .stat-card .stat-icon {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      transition: all 0.3s;
    }
    .stat-card:hover .stat-icon {
      transform: scale(1.1);
    }
    .stat-card .trend {
      font-size: 12px;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 10px;
      border-radius: 20px;
      background: rgba(40,167,69,0.12);
      color: #28a745;
    }
    .stat-card .trend.down {
      background: rgba(220,53,69,0.12);
      color: #dc3545;
    }
    .stat-card .trend.neutral {
      background: rgba(255,193,7,0.12);
      color: #ffc107;
    }
    .stat-card .info h6 {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .stat-card .info h3 {
      font-size: 30px;
      font-weight: 700;
      margin: 4px 0 8px;
      color: var(--text-primary);
    }
    .report-total-row {
      background: var(--bg-input);
      border-top: 2px solid var(--color-primary);
      font-weight: 700;
    }
    .report-total-row td {
      padding: 10px 16px;
    }
    .badge-status {
      font-size: 11px;
      padding: 4px 12px;
      border-radius: 20px;
    }
    .table-header .btn-group .btn {
      border-radius: var(--radius-sm);
    }
    .table-header .btn-group .btn.active {
      background: var(--color-primary);
      color: #fff;
      border-color: var(--color-primary);
    }
    /* تحسين الجداول */
    .table th {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.3px;
      border-bottom: 2px solid var(--border-color);
      padding: 12px 16px;
      white-space: nowrap;
    }
    .table td {
      padding: 12px 16px;
      vertical-align: middle;
      border-bottom: 1px solid var(--border-color);
    }
    .table tbody tr:last-child td {
      border-bottom: none;
    }
    .table tbody tr:hover {
      background: rgba(255,102,0,0.04);
    }
    [data-theme="dark"] .table tbody tr:hover {
      background: rgba(255,102,0,0.08);
    }
    /* تنسيق الرسوم البيانية */
    .chart-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 20px 24px;
      box-shadow: var(--shadow-sm);
      transition: all 0.3s;
    }
    .chart-card:hover {
      box-shadow: var(--shadow-md);
      border-color: var(--color-primary);
    }
    .chart-card h5 {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 16px;
    }
    .chart-card canvas {
      max-height: 200px;
      width: 100% !important;
    }
    @media (max-width: 768px) {
      .chart-card canvas {
        max-height: 160px;
      }
    }
  </style>
</head>
<body>

  <!-- ===== Sidebar (مثل السابق، نختصره هنا للاختصار) ===== -->
  <div id="sidebar-overlay" onclick="document.getElementById('sidebar').classList.remove('active')"></div>
  <aside id="sidebar">...</aside>

  <!-- ===== المحتوى الرئيسي ===== -->
  <div id="main-content">
    <header id="topbar">...</header>
    <section id="workspace">
      
      <!-- بطاقات الإحصائيات (محدثة) -->
      <div class="stats-grid mb-4" id="statsCards">
        <div class="stat-card">
          <div class="info">
            <h6>إجمالي العملاء</h6>
            <h3 id="statCustomers">0</h3>
            <span class="trend neutral"><i class="fas fa-users"></i> نشط</span>
          </div>
          <div class="stat-icon blue"><i class="fas fa-users"></i></div>
        </div>
        <div class="stat-card">
          <div class="info">
            <h6>إجمالي الطلبات</h6>
            <h3 id="statOrders">0</h3>
            <span class="trend up"><i class="fas fa-arrow-up"></i> +%</span>
          </div>
          <div class="stat-icon purple"><i class="fas fa-clipboard-list"></i></div>
        </div>
        <div class="stat-card">
          <div class="info">
            <h6>الإيرادات</h6>
            <h3 id="statRevenue">$0</h3>
            <span class="trend up"><i class="fas fa-arrow-up"></i> نمو</span>
          </div>
          <div class="stat-icon green"><i class="fas fa-dollar-sign"></i></div>
        </div>
        <div class="stat-card">
          <div class="info">
            <h6>المدفوعات</h6>
            <h3 id="statPayments">$0</h3>
            <span class="trend neutral"><i class="fas fa-credit-card"></i> محدث</span>
          </div>
          <div class="stat-icon orange"><i class="fas fa-credit-card"></i></div>
        </div>
      </div>

      <!-- الفلاتر -->
      <div class="d-flex flex-wrap gap-2 mb-4 align-items-center">
        <span class="fw-bold me-2">الفترة:</span>
        <button class="btn btn-outline-primary btn-sm filter-btn active" data-filter="7">آخر 7 أيام</button>
        <button class="btn btn-outline-primary btn-sm filter-btn" data-filter="30">آخر 30 يوم</button>
        <button class="btn btn-outline-primary btn-sm filter-btn" data-filter="90">آخر 3 أشهر</button>
        <button class="btn btn-outline-primary btn-sm filter-btn" data-filter="365">السنة</button>
        <button class="btn btn-outline-primary btn-sm filter-btn" data-filter="all">الكل</button>
        <div class="d-flex gap-2 me-2">
          <input type="date" class="form-control form-control-sm" id="dateFrom" style="width:150px;" />
          <input type="date" class="form-control form-control-sm" id="dateTo" style="width:150px;" />
          <button class="btn btn-sm btn-primary" id="applyCustomDate">تطبيق</button>
        </div>
      </div>

      <!-- الرسوم البيانية (4 رسوم) -->
      <div class="charts-grid mb-4">
        <div class="chart-card">
          <h5>توزيع الطلبات حسب الحالة</h5>
          <canvas id="ordersStatusChart"></canvas>
        </div>
        <div class="chart-card">
          <h5>الإيرادات الشهرية</h5>
          <canvas id="monthlyRevenueChart"></canvas>
        </div>
        <div class="chart-card">
          <h5>الخدمات الأكثر طلباً</h5>
          <canvas id="topServicesChart"></canvas>
        </div>
        <div class="chart-card">
          <h5>أداء الموظفين</h5>
          <canvas id="employeePerformanceChart"></canvas>
        </div>
      </div>

      <!-- التقارير الجدولية مع تبويبات -->
      <div class="table-wrapper">
        <div class="table-header">
          <ul class="nav nav-tabs card-header-tabs" id="reportTabs" role="tablist">
            <li class="nav-item"><button class="nav-link active" id="orders-tab" data-bs-toggle="tab" data-bs-target="#ordersReport" type="button" role="tab">تقرير الطلبات</button></li>
            <li class="nav-item"><button class="nav-link" id="customers-tab" data-bs-toggle="tab" data-bs-target="#customersReport" type="button" role="tab">تقرير العملاء</button></li>
            <li class="nav-item"><button class="nav-link" id="employees-tab" data-bs-toggle="tab" data-bs-target="#employeesReport" type="button" role="tab">تقرير الموظفين</button></li>
            <li class="nav-item"><button class="nav-link" id="payments-tab" data-bs-toggle="tab" data-bs-target="#paymentsReport" type="button" role="tab">تقرير المدفوعات</button></li>
            <li class="nav-item"><button class="nav-link" id="treasury-tab" data-bs-toggle="tab" data-bs-target="#treasuryReport" type="button" role="tab">تقرير الخزينة</button></li>
          </ul>
          <div class="d-flex gap-2">
            <button class="btn btn-sm btn-success" id="exportExcelBtn"><i class="fas fa-file-excel me-1"></i>Excel</button>
            <button class="btn btn-sm btn-danger" id="exportPdfBtn"><i class="fas fa-file-pdf me-1"></i>PDF</button>
            <button class="btn btn-sm btn-secondary" id="printBtn"><i class="fas fa-print me-1"></i>طباعة</button>
          </div>
        </div>
        <div class="p-3">
          <div class="tab-content" id="reportTabsContent">
            <!-- تقارير (نفس المحتوى السابق مع إضافة الخزينة) -->
            <div class="tab-pane fade show active" id="ordersReport" role="tabpanel">...</div>
            <div class="tab-pane fade" id="customersReport" role="tabpanel">...</div>
            <div class="tab-pane fade" id="employeesReport" role="tabpanel">...</div>
            <div class="tab-pane fade" id="paymentsReport" role="tabpanel">...</div>
            <div class="tab-pane fade" id="treasuryReport" role="tabpanel">...</div>
          </div>
        </div>
      </div>

    </section>
  </div>

  <!-- Import Map و Bootstrap JS وملفات JS -->
  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js",
        "firebase/storage": "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js"
      }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="assets/js/main.js"></script>
  <script type="module" src="assets/js/pages/reports.js"></script>

</body>
</html>
