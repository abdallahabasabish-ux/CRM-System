<body>

  <div class="modal fade" id="paymentModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="modalTitle">تسجيل دفعة جديدة</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="paymentForm">
            <input type="hidden" id="paymentId" />
            <input type="hidden" id="orderId" />
            <input type="hidden" id="oldAmount" />

            <div class="form-group mb-3">
              <label for="customerSelect" class="form-label">العميل <span class="text-danger">*</span></label>
              <select class="form-select" id="customerSelect" required>
                <option value="">اختر عميل...</option>
              </select>
            </div>

            <div class="form-group mb-3">
              <label for="orderSelect" class="form-label">الطلب <span class="text-danger">*</span></label>
              <select class="form-select" id="orderSelect" required disabled>
                <option value="">اختر طلب...</option>
              </select>
            </div>
            
            <div class="form-group mb-3">
              <label for="amount" class="form-label">المبلغ ($) <span class="text-danger">*</span></label>
              <input type="number" class="form-control" id="amount" step="0.01" required />
            </div>
            
            <div class="form-group mb-3">
              <label for="method" class="form-label">طريقة الدفع <span class="text-danger">*</span></label>
              <select class="form-select" id="method" required>
                <option value="">اختر طريقة</option>
                <option value="نقدي">نقدي</option>
                <option value="تحويل بنكي">تحويل بنكي</option>
                <option value="بطاقة ائتمان">بطاقة ائتمان</option>
                <option value="أونلاين">أونلاين</option>
                <option value="أخرى">أخرى</option>
              </select>
            </div>
            
            <div class="form-group mb-3">
              <label for="paymentDate" class="form-label">تاريخ الدفع</label>
              <input type="text" class="form-control" id="paymentDate" placeholder="اختر التاريخ" />
            </div>
            
            <div class="form-group mb-3">
              <label for="paymentNotes" class="form-label">ملاحظات</label>
              <textarea class="form-control" id="paymentNotes" rows="2"></textarea>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">إلغاء</button>
          <button type="button" class="btn btn-primary" id="savePaymentBtn">
            <i class="fas fa-save me-2"></i>حفظ
          </button>
        </div>
      </div>
    </div>
  </div>
