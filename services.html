<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>إدارة الخدمات - نظام إدارة الأعمال</title>
  
  <!-- Bootstrap 5 RTL -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet" />
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <!-- SweetAlert2 -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <!-- Toastify -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
  <!-- الأنماط المخصصة -->
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>

  <!-- ========================================= -->
  <!-- SIDEBAR -->
  <!-- ========================================= -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <i class="fas fa-cube"></i>
      <span>نظام إدارة الأعمال</span>
    </div>

    <ul class="sidebar-menu">
      <li><a href="dashboard.html"><i class="fas fa-chart-pie"></i> لوحة التحكم</a></li>
      <li><a href="customers.html"><i class="fas fa-users"></i> العملاء</a></li>
      <li><a href="services.html" class="active"><i class="fas fa-concierge-bell"></i> الخدمات</a></li>
      <li><a href="#"><i class="fas fa-clipboard-list"></i> الطلبات</a></li>
      <li><a href="#"><i class="fas fa-user-tie"></i> الموظفون</a></li>
      <li><a href="#"><i class="fas fa-file-invoice"></i> الفواتير</a></li>
      <li><a href="#"><i class="fas fa-credit-card"></i> المدفوعات</a></li>
      <li><a href="#"><i class="fas fa-chart-line"></i> التقارير</a></li>
      <li><a href="#"><i class="fas fa-cog"></i> الإعدادات</a></li>
    </ul>

    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar" id="sidebarAvatar">م</div>
        <div>
          <div class="fw-bold" id="sidebarUserName" style="font-size: 14px;">المستخدم</div>
          <div class="text-muted" style="font-size: 12px;" id="sidebarUserEmail">user@email.com</div>
        </div>
      </div>
    </div>
  </aside>

  <!-- ========================================= -->
  <!-- MAIN CONTENT -->
  <!-- ========================================= -->
  <main class="main-content">

    <!-- Top Navbar -->
    <nav class="top-navbar">
      <div>
        <button class="d-lg-none btn btn-sm" id="sidebarToggle" style="background: var(--border-color); border-radius: 8px;">
          <i class="fas fa-bars"></i>
        </button>
        <span class="page-title me-2">الخدمات</span>
      </div>
      <div class="nav-actions">
        <button class="theme-toggle" id="themeToggle" title="تبديل الوضع المظلم">
          <i class="fas fa-moon"></i>
        </button>
        <button id="logoutBtn" title="تسجيل الخروج">
          <i class="fas fa-sign-out-alt"></i>
        </button>
      </div>
    </nav>

    <!-- المحتوى -->
    <div class="container-fluid p-3 p-md-4">

      <!-- شريط الأدوات (بحث + زر إضافة) -->
      <div class="d-flex flex-wrap justify-content-between align-items-center mb-4 gap-2">
        <div class="d-flex gap-2 flex-wrap">
          <div class="input-group" style="max-width: 350px;">
            <span class="input-group-text bg-transparent border-color"><i class="fas fa-search"></i></span>
            <input type="text" class="form-control" id="searchInput" placeholder="بحث بالاسم أو القسم..." />
          </div>
        </div>
        <button class="btn btn-primary" id="addServiceBtn">
          <i class="fas fa-plus me-2"></i>إضافة خدمة
        </button>
      </div>

      <!-- الجدول -->
      <div class="card shadow-sm border-0">
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-hover align-middle mb-0" id="servicesTable">
              <thead class="bg-light">
                <tr>
                  <th>#</th>
                  <th>الاسم</th>
                  <th>السعر الافتراضي</th>
                  <th>القسم</th>
                  <th>مدة التنفيذ</th>
                  <th>الحالة</th>
                  <th style="width: 120px;">الإجراءات</th>
                </tr>
              </thead>
              <tbody id="servicesTableBody">
                <!-- سيتم ملء البيانات بواسطة JavaScript -->
                <tr><td colspan="7" class="text-center text-muted py-4">جاري تحميل الخدمات...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- عدد النتائج -->
      <div class="mt-3 text-muted small" id="resultCount">عرض 0 خدمة</div>

    </div>
  </main>

  <!-- ========================================= -->
  <!-- MODAL: إضافة / تعديل خدمة -->
  <!-- ========================================= -->
  <div class="modal fade" id="serviceModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="modalTitle">إضافة خدمة جديدة</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="serviceForm">
            <input type="hidden" id="serviceId" />
            
            <div class="mb-3">
              <label for="name" class="form-label">اسم الخدمة <span class="text-danger">*</span></label>
              <input type="text" class="form-control" id="name" required />
            </div>
            <div class="mb-3">
              <label for="description" class="form-label">الوصف</label>
              <textarea class="form-control" id="description" rows="2"></textarea>
            </div>
            <div class="mb-3">
              <label for="price" class="form-label">السعر الافتراضي ($) <span class="text-danger">*</span></label>
              <input type="number" class="form-control" id="price" step="0.01" required />
            </div>
            <div class="mb-3">
              <label for="category" class="form-label">القسم <span class="text-danger">*</span></label>
              <select class="form-select" id="category" required>
                <option value="">اختر القسم</option>
                <option value="تصميم">تصميم</option>
                <option value="تطوير">تطوير</option>
                <option value="تسويق">تسويق</option>
                <option value="استشارات">استشارات</option>
                <option value="تدريب">تدريب</option>
                <option value="أخرى">أخرى</option>
              </select>
            </div>
            <div class="mb-3">
              <label for="duration" class="form-label">مدة التنفيذ (أيام)</label>
              <input type="number" class="form-control" id="duration" min="1" />
            </div>
            <div class="mb-3">
              <label for="status" class="form-label">الحالة</label>
              <select class="form-select" id="status">
                <option value="نشط">نشط</option>
                <option value="غير نشط">غير نشط</option>
              </select>
            </div>
            <div class="mb-3">
              <label for="icon" class="form-label">أيقونة (Font Awesome class)</label>
              <input type="text" class="form-control" id="icon" placeholder="مثال: fa-code" />
            </div>
            <div class="mb-3">
              <label for="notes" class="form-label">ملاحظات</label>
              <textarea class="form-control" id="notes" rows="2"></textarea>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">إلغاء</button>
          <button type="button" class="btn btn-primary" id="saveServiceBtn">
            <i class="fas fa-save me-2"></i>حفظ
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- ========================================= -->
  <!-- Import Map & JavaScript -->
  <!-- ========================================= -->
  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js",
        "firebase/storage": "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js"
      }
    }
  </script>

  <!-- Bootstrap JS (للـ Modal) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <script type="module" src="assets/js/main.js"></script>
  <script type="module" src="assets/js/pages/services.js"></script>

</body>
</html>
